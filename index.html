<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VOD Bangla Media Ltd.</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;


    font-family:
    "Noto Sans Bengali",
    "Segoe UI",
    Arial,
    sans-serif;


    background:linear-gradient(
        -45deg,
        #00c853,
        #00bfa5,
        #2196f3,
        #9c27b0,
        #ff9800,
        #e91e63
    );


    background-size:400% 400%;


    animation:gradientBG 12s ease infinite;

}




@keyframes gradientBG{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }

}




.container{


    width:90%;

    max-width:420px;


    background:rgba(255,255,255,0.94);


    backdrop-filter:blur(10px);


    padding:40px 25px;


    text-align:center;


    border-radius:25px;


    box-shadow:
    0 15px 40px rgba(0,0,0,0.20);

}




/* Company Name */


.company-name{


    font-size:32px;

    font-weight:700;

    color:#00854a;

    margin-bottom:20px;

}


.company-name span{

    color:#e60000;

}




/* News Channel */


.channel{

    font-size:18px;

    color:#555;

    margin-bottom:25px;

}




/* Slogan */


.slogan{

    font-size:24px;

    font-weight:bold;

    color:#000000;

}




/* Buttons */


.btn{


    display:block;


    width:100%;


    padding:16px;


    margin:15px 0;


    border-radius:50px;


    text-decoration:none;


    color:white;


    font-size:17px;


    font-weight:bold;


    transition:.3s;

}




.btn:hover{

    transform:scale(1.05);

}




.whatsapp{

    background:#25D366;

}




.website{

    background:#00854a;

}




.call{

    background:#e91e63;

}




.footer{


    margin-top:25px;


    color:#777;


    font-size:13px;

}


</style>


</head>



<body>


<div class="container">





<div class="company-name">

VOD Bangla <span>Media Ltd.</span>

</div>





<div class="channel">

News Channel

<br><br>


<div class="slogan">

"পথ দেখে, পথ দেখায়"

</div>


</div>






<a class="btn whatsapp"

href="https://wa.me/8801786091965"

target="_blank">

💬 WhatsApp Us

</a>







<a class="btn website"

href="https://vodbangla.com/"

target="_blank">

🌐 Visit Website

</a>







<a class="btn call"

href="tel:+8801901634711">

📞 Call Now

</a>







<div class="footer">

© 2026 VOD Bangla Media Ltd.

<br>

All Rights Reserved

</div>




</div>



</body>

</html>
